<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AniScan{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="noise"></div>
    <div class="scanlines"></div>

    <header class="header">
        <a href="{{ url_for('main.index') }}" class="logo">
            <span class="logo-bracket">[</span>
            AniScan
            <span class="logo-bracket">]</span>
        </a>
        <div class="header-tag">OCR · Jikan API · Watchlist Matcher</div>
    </header>

    <main class="main">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-container">
                    {% for message in messages %}
                        <div class="flash-msg">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>AniScan</span>
        <span class="footer-sep">//</span>
        <span>Powered by Jikan & EasyOCR</span>
    </footer>
</body>
</html>
