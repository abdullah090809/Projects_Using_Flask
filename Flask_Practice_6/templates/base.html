<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}| My Feedback Site{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f9fb;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #ffffff;
            border-bottom: 1px solid #e8eaf0;
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        nav a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        nav a:hover {
            background: #f1f5f9;
            color: #1a1a2e;
        }

        .nav-feedback {
            background: #1a1a2e !important;
            color: white !important;
        }

        .nav-feedback:hover {
            background: #2d2d4e !important;
            color: white !important;
        }

        main {
            flex: 1;
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid #e8eaf0;
            background: #ffffff;
        }
    </style>

    {% block style %}{% endblock %}
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">Feedback Site</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/feedback" class="nav-feedback">Give Feedback</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>Flask Simple Feedback Page</footer>

</body>
</html>
