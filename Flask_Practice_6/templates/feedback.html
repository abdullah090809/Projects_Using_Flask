{% extends "base.html" %}

{% block title %}Feedback Page{% endblock %}

{% block style %}
<style>
    .form-card {
        background: white;
        border: 1px solid #e8eaf0;
        border-radius: 16px;
        padding: 2.5rem;
        max-width: 480px;
        margin: 0 auto;
    }

    .form-card h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 0.4rem;
    }

    .form-card p {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 2rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 1.25rem;
    }

    label {
        font-size: 13px;
        font-weight: 500;
        color: #1a1a2e;
    }

    input, textarea {
        padding: 10px 14px;
        border: 1px solid #e8eaf0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        color: #1a1a2e;
        background: #f8f9fb;
        outline: none;
        transition: border 0.2s;
    }

    input:focus, textarea:focus {
        border-color: #1a1a2e;
        background: white;
    }

    textarea {
        resize: vertical;
        min-height: 120px;
    }

    .btn-submit {
        width: 100%;
        background: #1a1a2e;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
    }

    .btn-submit:hover {
        background: #2d2d4e;
    }
</style>
{% endblock %}

{% block content %}
    <div class="form-card">
        <h1>Share your feedback</h1>
        <p>We read every submission and appreciate your time.</p>

        <form method="POST" action="/feedback">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea name="message" id="message" placeholder="Enter your message"></textarea>
            </div>

            <button type="submit" class="btn-submit">Submit Feedback</button>
        </form>
    </div>
{% endblock %}
