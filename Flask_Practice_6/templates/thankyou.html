{% extends "base.html" %}

{% block title %}Thank You{% endblock %}

{% block style %}
<style>
    .thankyou-card {
        background: white;
        border: 1px solid #e8eaf0;
        border-radius: 16px;
        padding: 3rem 2.5rem;
        max-width: 480px;
        margin: 0 auto;
        text-align: center;
    }

    .icon {
        width: 56px;
        height: 56px;
        background: #f0fdf4;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 24px;
    }

    .thankyou-card h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
    }

    .thankyou-card h2 {
        font-size: 1rem;
        font-weight: 400;
        color: #64748b;
        margin-bottom: 2rem;
    }

    .btn {
        display: inline-block;
        background: #1a1a2e;
        color: white;
        text-decoration: none;
        padding: 11px 24px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.2s;
    }

    .btn:hover {
        background: #2d2d4e;
    }
</style>
{% endblock %}

{% block content %}
    <div class="thankyou-card">
        <div class="icon">✓</div>
        <h1>Welcome, {{ name }}!</h1>
        <h2>Thank you for your feedback.</h2>
        <a href="/feedback" class="btn">Submit Another</a>
    </div>
{% endblock %}
